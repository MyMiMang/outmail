# 把这个文件放到宿主机 /etc/nginx/conf.d/webmail.conf （或 sites-available + 软链接）
# 然后：nginx -t && systemctl reload nginx
#
# 提前把域名（如 mail.example.com）解析到本服务器
# HTTPS 证书可以用：
#   certbot --nginx -d mail.example.com
# 或者已有泛域名证书直接改下面的 ssl_certificate 路径

server {
    listen 80;
    listen [::]:80;
    server_name mail.example.com;     # ← 改成你的域名

    # 让 certbot 走 webroot / Let's Encrypt 续签
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 全部跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.example.com;     # ← 改成你的域名

    # ↓ certbot 申请后会自动写入这两行；如果手动配置请改成自己的证书路径
    ssl_certificate     /etc/letsencrypt/live/mail.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 上传 / 邮件正文渲染需要稍大的 buffer
    client_max_body_size 10m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # 反代到 webmail 容器
    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
