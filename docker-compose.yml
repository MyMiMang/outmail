# 仅启动 webmail 后端，绑定到 127.0.0.1:8765
# 由宿主机现有 nginx 反代到对外域名（推荐做法，与服务器其他项目共存）
#
# 如果你的服务器 80/443 是空的，想用容器自带的 Caddy 自动 HTTPS，
# 请改用 docker-compose.caddy.yml（仓库内附带）。

services:
  webmail:
    build: .
    image: webmail:latest
    container_name: webmail
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"   # 只绑定到宿主机回环，外网访问不到，由 nginx 反代
    environment:
      ACCESS_PASSWORD: "${ACCESS_PASSWORD:-}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      LOG_LEVEL: "INFO"
      TZ: "Asia/Shanghai"
