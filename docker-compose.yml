services:
  webmail:
    build: .
    image: webmail:latest
    container_name: webmail
    restart: unless-stopped
    expose:
      - "8765"
    environment:
      # 留空表示无密码（任何人能访问 API），强烈建议在公网部署时设置一个强密码
      ACCESS_PASSWORD: "${ACCESS_PASSWORD:-}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      LOG_LEVEL: "INFO"
      TZ: "Asia/Shanghai"
    networks:
      - webnet

  caddy:
    image: caddy:2.8-alpine
    container_name: webmail-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:-:80}"          # 设置成你的域名（如 mail.example.com）即可自动 HTTPS；留空 :80 仅 HTTP
      EMAIL: "${EMAIL:-}"                # ACME 通知邮箱（可选）
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - webmail
    networks:
      - webnet

volumes:
  caddy_data:
  caddy_config:

networks:
  webnet:
