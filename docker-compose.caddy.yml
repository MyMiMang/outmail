# 备用部署：webmail + Caddy 自带 HTTPS（需要 80/443 空闲）
# 用法：docker compose -f docker-compose.caddy.yml up -d --build
services:
  webmail:
    build: .
    image: webmail:latest
    container_name: webmail
    restart: unless-stopped
    expose:
      - "8765"
    environment:
      ACCESS_PASSWORD: "${ACCESS_PASSWORD:-}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      LOG_LEVEL: "INFO"
      TZ: "Asia/Shanghai"
    networks:
      - webnet

  caddy:
    image: caddy:2.8-alpine
    container_name: webmail-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:-:80}"
      EMAIL: "${EMAIL:-}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - webmail
    networks:
      - webnet

volumes:
  caddy_data:
  caddy_config:

networks:
  webnet:
